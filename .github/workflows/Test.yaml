name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore azurepractice/azurepractice.sln

      - name: Build
        run: dotnet build azurepractice/azurepractice.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test azurepractice/azurepractice.sln --configuration Release --no-build --verbosity normal
